<div class="catalog">
  <div class="container">

    <div class="catalog-title">
      Каталог
    </div>

    <div class="catalog-head">
      <div class="catalog-filtration" [class.filtration-open]="filtrationOpen" (click)="toggleFiltration()"
           (clickOutside)="filtrationOpen = false">
        <div class="catalog-filtration-head ">
          <a >
            <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision"
                 text-rendering="geometricPrecision" image-rendering="optimizeQuality" fill-rule="evenodd"
                 clip-rule="evenodd" viewBox="0 0 487 511.954">
              <path fill-rule="nonzero"
                    d="M0 52.894h146.098a70.42 70.42 0 0118.388-32.26C177.18 7.874 194.783 0 214.13 0c19.37 0 36.95 7.874 49.645 20.569s20.569 30.275 20.569 49.644c0 19.348-7.874 36.95-20.569 49.645-12.76 12.673-30.319 20.569-49.645 20.569-19.282 0-36.884-7.896-49.579-20.569-8.79-8.812-15.29-19.936-18.453-32.326H0V52.894zm392.096 201.698a35.528 35.528 0 00-10.404-25.172 35.526 35.526 0 00-25.172-10.404 35.562 35.562 0 00-25.171 10.404c-6.413 6.369-10.404 15.334-10.404 25.172 0 9.837 3.991 18.802 10.382 25.193 6.391 6.391 15.356 10.382 25.193 10.382 9.837 0 18.802-3.991 25.193-10.382a35.728 35.728 0 0010.383-25.193zm14.069-49.645a70.26 70.26 0 0118.409 32.326h62.405v34.637h-62.405a70.366 70.366 0 01-18.409 32.326c-12.761 12.673-30.319 20.569-49.645 20.569-19.282 0-36.884-7.896-49.579-20.569-12.738-12.76-20.634-30.362-20.634-49.644 0-19.326 7.896-36.885 20.569-49.58 12.694-12.76 30.297-20.634 49.644-20.634 19.369 0 36.95 7.874 49.645 20.569zM260.11 271.91H0v-34.637h260.11v34.637zM67.007 424.421a70.414 70.414 0 0118.388-32.26c12.694-12.76 30.297-20.634 49.644-20.634 19.369 0 36.95 7.874 49.645 20.569 12.694 12.694 20.569 30.275 20.569 49.644 0 19.347-7.875 36.95-20.569 49.645-12.76 12.672-30.319 20.569-49.645 20.569-19.282 0-36.884-7.897-49.579-20.569-8.79-8.813-15.29-19.937-18.453-32.326H0v-34.638h67.007zm42.839-7.852c-6.391 6.369-10.382 15.334-10.382 25.171s3.991 18.802 10.382 25.193c6.391 6.391 15.356 10.383 25.193 10.383 9.838 0 18.803-3.992 25.193-10.383a35.728 35.728 0 0010.383-25.193 35.525 35.525 0 00-35.576-35.576 35.654 35.654 0 00-25.193 10.405zm121.603 7.852h255.508v34.638H231.449v-34.638zM188.937 45.042c-6.391 6.369-10.382 15.334-10.382 25.171 0 9.838 3.991 18.802 10.382 25.193 6.391 6.391 15.356 10.383 25.193 10.383 9.838 0 18.802-3.992 25.193-10.383a35.725 35.725 0 0010.383-25.193 35.524 35.524 0 00-35.576-35.575 35.653 35.653 0 00-25.193 10.404zm121.603 7.852H487v34.638H310.54V52.894z"/>
            </svg>
          </a>

          <span>Фильтры</span>
        </div>
        <div class="catalog-filtration-body">
          <div class="catalog-filtration-item">
            <category-filter [categoryWithTypes]="categoryWithTypes"
                             *ngFor="let categoryWithTypes of categoriesWithTypes"></category-filter>
          </div>
        </div>

      </div>
      <div class="catalog-applied-filters">
        <div class="catalog-applied-filter" *ngFor="let appliedFilter of appliedFilters">
          <span>{{appliedFilter.name}}</span>
          <a (click)="removeAppliedFilter(appliedFilter)">
            <svg width="16" height="17" viewBox="0 0 16 17" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g clip-path="url(#clip0_20707_954)">
                <line x1="1.93562" y1="3.1499" x2="13.9564" y2="15.1707" stroke="#A8ABA7" stroke-linecap="round"/>
                <line x1="13.9238" y1="3.12996" x2="1.90301" y2="15.1508" stroke="#A8ABA7" stroke-linecap="round"/>
              </g>
            </svg>

          </a>
        </div>
      </div>
      <div class="catalog-sorting" [class.open]="sortingOpen" (click)="toggleSorting()"
           (clickOutside)="sortingOpen = false">
        <div class="catalog-sorting-head ">
          <span>Сортировать</span>
          <a>
            <svg width="20" height="21" viewBox="0 0 20 21" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M10.0003 14.5C9.41693 14.5 8.83359 14.275 8.39193 13.8334L2.95859 8.40003C2.71693 8.15837 2.71693 7.75837 2.95859 7.5167C3.20026 7.27503 3.60026 7.27503 3.84193 7.5167L9.27526 12.95C9.67526 13.35 10.3253 13.35 10.7253 12.95L16.1586 7.5167C16.4003 7.27503 16.8003 7.27503 17.0419 7.5167C17.2836 7.75837 17.2836 8.15837 17.0419 8.40003L11.6086 13.8334C11.1669 14.275 10.5836 14.5 10.0003 14.5Z"
                fill="#2C2C2C"/>
            </svg>
          </a>
        </div>
        <div class="catalog-sorting-body">
          <div class="catalog-sorting-item"
               [class.active]="this.activeParams.sort ? this.activeParams.sort === sortingOption.value : false "
               (click)="sort(sortingOption.value)"
               *ngFor="let sortingOption of sortingOptions">{{sortingOption.name}}
          </div>

        </div>
      </div>
    </div>

    <div class="catalog-layout">
      <div class="catalog-filters">
        <category-filter [categoryWithTypes]="categoryWithTypes"
                         *ngFor="let categoryWithTypes of categoriesWithTypes"></category-filter>

      </div>
      <div class="catalog-products">
        <product-card [countInCart]="product.countInCart" *ngFor="let product of products"
                      [product]="product"></product-card>
      </div>
    </div>

    <div class="pagination" *ngIf="pages.length > 1">
      <div class="pagination-arrow" (click)="openPrevPage()"

           [class.disabled]="activeParams.page ? activeParams.page === 1 : true">
        <svg width="24" height="25" viewBox="0 0 24 25" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M9.56988 5.98092C9.75988 5.98092 9.94988 6.04973 10.0999 6.19717C10.3899 6.48223 10.3899 6.95405 10.0999 7.2391L4.55988 12.6847L10.0999 18.1303C10.3899 18.4153 10.3899 18.8871 10.0999 19.1722C9.80988 19.4573 9.32988 19.4573 9.03988 19.1722L2.96988 13.2056C2.67988 12.9206 2.67988 12.4488 2.96988 12.1637L9.03988 6.19717C9.18988 6.04973 9.37988 5.98092 9.56988 5.98092Z"
            fill="#2C2C2C"/>
          <path
            d="M3.67 11.9474L20.5 11.9474C20.91 11.9474 21.25 12.2816 21.25 12.6847C21.25 13.0877 20.91 13.4219 20.5 13.4219L3.67 13.4219C3.26 13.4219 2.92 13.0877 2.92 12.6847C2.92 12.2816 3.26 11.9474 3.67 11.9474Z"
            fill="#2C2C2C"/>
        </svg>
      </div>
      <div class="pagination-pages">
        <a class="pagination-page" (click)="openPage(page)"
           [class.active]="this.activeParams.page ? this.activeParams.page === page : (page ===1)"
           *ngFor="let page of pages">{{page}}</a>
      </div>
      <div class="pagination-arrow " (click)="openNextPage()"
           [class.disabled]="activeParams.page ? activeParams.page === pages.length: false">
        <svg width="24" height="25" viewBox="0 0 24 25" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M14.4301 19.3885C14.2401 19.3885 14.0501 19.3197 13.9001 19.1722C13.6101 18.8872 13.6101 18.4153 13.9001 18.1303L19.4401 12.6847L13.9001 7.23913C13.6101 6.95407 13.6101 6.48225 13.9001 6.19719C14.1901 5.91213 14.6701 5.91213 14.9601 6.19719L21.0301 12.1637C21.3201 12.4488 21.3201 12.9206 21.0301 13.2057L14.9601 19.1722C14.8101 19.3197 14.6201 19.3885 14.4301 19.3885Z"
            fill="#2C2C2C"/>
          <path
            d="M20.33 13.4219H3.5C3.09 13.4219 2.75 13.0877 2.75 12.6847C2.75 12.2817 3.09 11.9475 3.5 11.9475H20.33C20.74 11.9475 21.08 12.2817 21.08 12.6847C21.08 13.0877 20.74 13.4219 20.33 13.4219Z"
            fill="#2C2C2C"/>
        </svg>

      </div>
    </div>

  </div>
</div>
